# Metadata defining the behaviour and requirements for this app

# expected fields in the configuration file for this app
configuration:

    # tank write nodes paths
    write_nodes:
        type: list
        description: "A list of dictionaries in which you define the Flow Production Tracking
                     Write nodes that are supported in this configuration. Each dictionary entry
                     needs to have the following keys: 'name' - a descriptive name for this node.
                     'file_type' - the file type to use for the renders (abc, obj, fbx etc).
                     This will be passed to the Nuke WriteGeo node when rendering. 'cache_ext' -
                     the file extension to use for the '{cache_ext}' template field, required
                     whenever the configured templates use it. 'settings' -
                     configuration settings for the given file type, as a dictionary. This too
                     will be passed to the WriteGeo node when rendering. Next, you need two entries
                     named 'render_template' and 'publish_template'
                     - these control the locations where data is written to at various stages
                     of the workflow. These templates need to include the 'version' field
                     and can optionally include the fields 'name' and 'output'
                     (which reflect the geometry output name) and 'pf_element_name' and 'pf_element_variant'
                     for published file element tracking."
        allows_empty: True
        values:
            type: dict
            items:
                name:
                    type: str
                file_type:
                    type: str
                cache_ext:
                    type: str
                    description: "The file extension to use for the '{cache_ext}' template field
                                 (e.g. abc, obj, fbx). Required whenever the configured
                                 render_template/publish_template make use of that field."
                settings:
                    type: dict
                tank_type:
                    type: tank_type
                render_template:
                    type: template
                    fields: context, version, [SEQ], [channel], [output], [name], [pf_element_name], [pf_element_variant], *
                publish_template:
                    type: template
                    fields: context, version, [SEQ], [channel], [output], [name], [pf_element_name], [pf_element_variant], [TankType], *
                tile_color:
                    type: list
                    values:
                        type: int
                    description:    "Specify a list of 3 values in the range 0-255 that represent the RGB values to be
                                     set for the node background/tile_color in the node graph when this profile is used.
                                     Specify an empty list to use the default colour."
                    allows_empty: True
                    default_value: []
                promote_write_knobs:
                    type: list
                    values:
                        type: str
                    description:    "Specify a list of knob names that should be promoted from the internal WriteGeo node
                                     up to the user interface of the gizmo."
                    allows_empty: True
                    default_value: []
                pf_element_name:
                    type: str
                    description:    "Optional value used to pre-populate the 'pf_element_name' knob on nodes
                                     created from this profile (placeholder metadata takes precedence if set)."
                    allows_empty: True
                    default_value: ""
                pf_element_variant:
                    type: str
                    description:    "Optional value used to pre-populate the 'pf_element_variant' knob on nodes
                                     created from this profile (placeholder metadata takes precedence if set)."
                    allows_empty: True
                    default_value: ""

    # Note that if you have presets which promote write knobs, the convert menu items will not be shown, regardless
    # of the value applied to this setting, as at present the convert back method doesn't support promoted knobs.
    show_convert_actions:
        type: bool
        description: "Setting this to True will add actions for converting to and from Flow Production Tracking
                      WriteGeo nodes. The actions will be displayed as options in the
                      Flow Production Tracking -> Context menu"
        default_value: False

    template_script_work:
        type: template
        description: "A reference to a template which locates a nuke script work file on disk. This
                     is used to drive the version and optionally the name of renders."
        fields: context, version, [name], *

# the Shotgun fields that this app needs in order to operate correctly
requires_shotgun_fields:

# More verbose description of this item
display_name: "Write Geo Node"
description: "Support for the Flow Production Tracking Write Geo Node in Nuke. Handles 3D geometry exports (Alembic, FBX, OBJ)."

# Required minimum versions for this item to run
requires_shotgun_version:
requires_core_version: "v0.19.8"
minimum_python_version: "3.9"
requires_engine_version: "v0.2.3"

# the engines that this app can operate in:
supported_engines: [tk-nuke]

# the frameworks required to run this app
frameworks:
